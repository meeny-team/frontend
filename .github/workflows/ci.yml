name: CI

on:
  push:
    branches:
      - dev
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'refactor/**'
  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 기존 dev 에 lint 에러 누적이 있어 일단 정보용. lint cleanup PR 머지 후 continue-on-error 제거 예정.
      - name: ESLint (informational)
        continue-on-error: true
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Jest
        run: npm test -- --watchAll=false --ci
